server:
  port: ${SERVER_PORT:8383}

spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /product/swagger-ui.html
  api-docs:
    path: /product/v3/api-docs
